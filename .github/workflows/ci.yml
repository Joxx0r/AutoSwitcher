name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@v0.3.3

      - name: Generate resources
        run: go generate ./...

      - name: Build
        run: go build -v -ldflags="-H windowsgui" -o AutoSwitcher.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSwitcher
          path: AutoSwitcher.exe

  test:
    runs-on: windows-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # Tests run WITHOUT the admin manifest .syso so they don't require elevation
      - name: Test
        run: go test -v ./...

  lint:
    runs-on: windows-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  vet:
    runs-on: windows-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Vet
        run: go vet ./...
